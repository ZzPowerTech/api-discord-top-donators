version: "3.8"

services:
  api-site:
    # Versao resolvida por API_SITE_VERSION (definida pelo deploy); cai em latest.
    image: zzpowertech/api-site:${API_SITE_VERSION:-latest}
    container_name: api-site
    pull_policy: always
    ports:
      - "3333:3333"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3333/health',(r)=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
