name: Release, Docker Publish and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Opcional: forcar bump (patch|minor|major)"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-deploy-main
  cancel-in-progress: false

env:
  IMAGE_NAME: zzpowertech/api-site
  APP_CONTAINER_NAME: api-site

jobs:
  ci:
    name: Lint, Test, Build e Validacao da Imagem
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes unitarios
        run: npm test

      - name: Build
        run: npm run build

      - name: Testes e2e
        run: npm run test:e2e

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (validacao, sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test da imagem (canvas + ICU pt-BR no slim)
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:ci node -e "const {createCanvas}=require('@napi-rs/canvas');const c=createCanvas(64,64);const x=c.getContext('2d');x.font='20px sans-serif';x.fillText('a',5,30);const b=c.toBuffer('image/png');const l=new Intl.DateTimeFormat('pt-BR',{month:'long'}).format(new Date(Date.UTC(2025,1,15)));if(!b.length){console.error('canvas vazio');process.exit(1);}if(l!=='fevereiro'){console.error('ICU pt-BR falhou: '+l);process.exit(1);}console.log('OK canvas='+b.length+'B icu='+l);"

  release:
    name: Versionamento e Release
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Get latest tag
        id: latest
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: version
        shell: bash
        env:
          FORCE_BUMP: ${{ github.event.inputs.force_bump || '' }}
        run: |
          LATEST_TAG="${{ steps.latest.outputs.latest_tag }}"
          BASE_VERSION="${LATEST_TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format=%B HEAD)
          else
            COMMITS=$(git log --format=%B "$LATEST_TAG"..HEAD)
          fi

          BUMP_TYPE="patch"

          if [ -n "$FORCE_BUMP" ]; then
            BUMP_TYPE="$FORCE_BUMP"
          else
            if echo "$COMMITS" | grep -Eq 'BREAKING CHANGE|!: '; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -Eiq '^feat(\(.+\))?: '; then
              BUMP_TYPE="minor"
            elif echo "$COMMITS" | grep -Eiq '^fix(\(.+\))?: '; then
              BUMP_TYPE="patch"
            fi
          fi

          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor)
              MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch)
              PATCH=$((PATCH + 1)) ;;
            *)
              echo "Tipo de bump invalido: $BUMP_TYPE"; exit 1 ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG ja existe"; exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $TAG"

      - name: Create and push Git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "release: $TAG"
          git push origin "$TAG"

      - name: Create GitHub release with auto notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs:
      - release
      - docker
    steps:
      - name: Checkout (para enviar o docker-compose versionado)
        uses: actions/checkout@v4

      - name: Enviar docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy com healthcheck e rollback
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            VERSION="${{ needs.release.outputs.version }}"
            CONTAINER="${{ env.APP_CONTAINER_NAME }}"

            cd "$APP_DIR"
            echo "Diretorio: $(pwd)"

            if [ ! -f .env ]; then
              echo "Arquivo .env nao encontrado em $APP_DIR"; exit 1
            fi

            # Backup do .env para permitir rollback.
            cp .env .env.bak
            PREV_VERSION=$(grep '^API_SITE_VERSION=' .env | cut -d= -f2- || true)
            echo "Versao anterior: ${PREV_VERSION:-<nenhuma>} -> nova: $VERSION"

            # Define a versao a ser executada via API_SITE_VERSION (consumida pelo compose).
            if grep -q '^API_SITE_VERSION=' .env; then
              sed -i "s|^API_SITE_VERSION=.*|API_SITE_VERSION=$VERSION|" .env
            else
              echo "API_SITE_VERSION=$VERSION" >> .env
            fi

            echo "Atualizando container..."
            docker compose pull "$CONTAINER"
            docker compose up -d "$CONTAINER"

            # Aguarda o container ficar saudavel (HEALTHCHECK da imagem).
            HEALTHY=0
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format '{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then HEALTHY=1; break; fi
              echo "Aguardando health ($i/30): $STATUS"
              sleep 3
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "::error:: Healthcheck falhou. Revertendo para a versao anterior."
              cp .env.bak .env
              docker compose pull "$CONTAINER" || true
              docker compose up -d "$CONTAINER" || true
              exit 1
            fi

            echo "Deploy de $VERSION concluido e container saudavel."

            # Limpeza conservadora: remove apenas imagens dangling com mais de 7 dias
            # (preserva a versao anterior para rollback rapido).
            docker image prune -f --filter "until=168h" || true
