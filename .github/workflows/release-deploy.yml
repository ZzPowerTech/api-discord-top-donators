name: Release, Docker Publish and Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            force_bump:
                description: "Opcional: forcar bump (patch|minor|major)"
                required: false
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write

concurrency:
    group: release-deploy-main
    cancel-in-progress: false

env:
    IMAGE_NAME: zzpowertech/api-site
    APP_CONTAINER_NAME: api-site
    COMPOSE_FILE_NAME: docker-compose.yaml

jobs:
    release:
        name: Generate Version and Release
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.version.outputs.tag }}
            version: ${{ steps.version.outputs.version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Configure Git Identity
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Get latest tag
              id: latest
              run: |
                  LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
                  if [ -z "$LATEST_TAG" ]; then
                    LATEST_TAG="v0.0.0"
                  fi
                  echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

            - name: Determine next version
              id: version
              shell: bash
              env:
                  FORCE_BUMP: ${{ github.event.inputs.force_bump || '' }}
              run: |
                  LATEST_TAG="${{ steps.latest.outputs.latest_tag }}"
                  BASE_VERSION="${LATEST_TAG#v}"

                  IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

                  COMMITS=$(git log --format=%B "$LATEST_TAG"..HEAD)

                  BUMP_TYPE="patch"

                  if [ -n "$FORCE_BUMP" ]; then
                    BUMP_TYPE="$FORCE_BUMP"
                  else
                    if echo "$COMMITS" | grep -Eq 'BREAKING CHANGE|!: '; then
                      BUMP_TYPE="major"
                    elif echo "$COMMITS" | grep -Eiq '^feat(\(.+\))?: '; then
                      BUMP_TYPE="minor"
                    elif echo "$COMMITS" | grep -Eiq '^fix(\(.+\))?: '; then
                      BUMP_TYPE="patch"
                    fi
                  fi

                  case "$BUMP_TYPE" in
                    major)
                      MAJOR=$((MAJOR + 1))
                      MINOR=0
                      PATCH=0
                      ;;
                    minor)
                      MINOR=$((MINOR + 1))
                      PATCH=0
                      ;;
                    patch)
                      PATCH=$((PATCH + 1))
                      ;;
                    *)
                      echo "Tipo de bump invalido: $BUMP_TYPE"
                      exit 1
                      ;;
                  esac

                  VERSION="$MAJOR.$MINOR.$PATCH"
                  TAG="v$VERSION"

                  if git rev-parse "$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG ja existe"
                    exit 1
                  fi

                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "Next tag: $TAG"

            - name: Create and push Git tag
              run: |
                  TAG="${{ steps.version.outputs.tag }}"
                  git tag -a "$TAG" -m "release: $TAG"
                  git push origin "$TAG"

            - name: Create GitHub release with auto notes
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  generate_release_notes: true
                  make_latest: true

    docker:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: release

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
                      ${{ env.IMAGE_NAME }}:latest

    deploy:
        name: Deploy on VPS
        runs-on: ubuntu-latest
        needs:
            - release
            - docker

        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER || 'root' }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_SSH_PORT || 22 }}
                  script: |
                      set -e
                      APP_DIR="${{ secrets.VPS_APP_DIR }}"
                      VERSION="${{ needs.release.outputs.version }}"
                      COMPOSE_FILE="${{ env.COMPOSE_FILE_NAME }}"

                      cd "$APP_DIR"

                      if [ ! -f "$COMPOSE_FILE" ]; then
                        if [ -f "docker-compose.yml" ]; then
                          COMPOSE_FILE="docker-compose.yml"
                        elif [ -f "docker-compose.yaml" ]; then
                          COMPOSE_FILE="docker-compose.yaml"
                        else
                          echo "Arquivo docker-compose.yml ou docker-compose.yaml nao encontrado em $APP_DIR"
                          exit 1
                        fi
                      fi

                      if grep -Eq '^[[:space:]]*image:[[:space:]]*${{ env.IMAGE_NAME }}:' "$COMPOSE_FILE"; then
                        sed -i -E "s|^([[:space:]]*image:[[:space:]]*)${{ env.IMAGE_NAME }}:.*$|\1${{ env.IMAGE_NAME }}:${VERSION}|" "$COMPOSE_FILE"
                      else
                        echo "Nao foi encontrada linha de image para ${{ env.IMAGE_NAME }} no $COMPOSE_FILE"
                        exit 1
                      fi

                      docker compose -f "$COMPOSE_FILE" pull ${{ env.APP_CONTAINER_NAME }}
                      docker compose -f "$COMPOSE_FILE" up -d --force-recreate
                      docker image prune -f

                      docker compose -f "$COMPOSE_FILE" ps
                      docker logs "${{ env.APP_CONTAINER_NAME }}" --tail 100
